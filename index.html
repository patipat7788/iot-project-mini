<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Environment Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #7dd3fc;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto 28px;
    }
    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid #334155;
    }
    .card .icon  { font-size: 2rem; margin-bottom: 8px; }
    .card .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; }
    .card .value { font-size: 2rem; font-weight: bold; color: #f1f5f9; }
    .card .unit  { font-size: 0.85rem; color: #64748b; }
    .card.motion-on  .value { color: #f87171; }
    .card.motion-off .value { color: #4ade80; }
    .controls { max-width: 960px; margin: 0 auto 32px; }
    .section-title {
      font-size: 0.85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      flex: 1;
      min-width: 120px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn.off { background: #334155; color: #94a3b8; }
    .btn.led.on    { background: #f59e0b; color: #1e293b; box-shadow: 0 0 14px #f59e0b60; }
    .btn.servo.on  { background: #10b981; color: #fff;    box-shadow: 0 0 14px #10b98160; }
    .btn.buzzer.on { background: #f43f5e; color: #fff;    box-shadow: 0 0 14px #f43f5e60; }
    .btn:hover { opacity: 0.85; transform: scale(0.98); }
    .charts-section { max-width: 960px; margin: 0 auto 24px; }
    .chart-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: #0284c7; border-color: #0284c7; color: #fff; }
    .chart-wrap {
      background: #1e293b;
      border-radius: 14px;
      border: 1px solid #334155;
      padding: 20px;
      display: none;
    }
    .chart-wrap.active { display: block; }
    .chart-wrap canvas { max-height: 260px; }
    #alert-msg {
      max-width: 960px;
      margin: 0 auto 16px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #f43f5e22;
      border: 1px solid #f43f5e55;
      color: #fca5a5;
      font-size: 0.85rem;
      display: none;
    }
    .timestamp {
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>🌿 Smart Environment Monitor</h1>

  <div id="alert-msg"></div>

  <div class="grid">
    <div class="card">
      <div class="icon">🌡️</div>
      <div class="label">Temperature</div>
      <div class="value" id="temp">--</div>
      <div class="unit">°C</div>
    </div>
    <div class="card">
      <div class="icon">💧</div>
      <div class="label">Humidity</div>
      <div class="value" id="humidity">--</div>
      <div class="unit">%</div>
    </div>
    <div class="card">
      <div class="icon">☀️</div>
      <div class="label">Light</div>
      <div class="value" id="light">--</div>
      <div class="unit">lux</div>
    </div>
    <div class="card" id="motion-card">
      <div class="icon">🚶</div>
      <div class="label">Motion</div>
      <div class="value" id="motion">--</div>
    </div>
  </div>

  <div class="controls">
    <div class="section-title">ควบคุมอุปกรณ์</div>
    <div class="btn-row">
      <button class="btn led off"    id="btn-led"    onclick="toggle('led')">💡 LED</button>
      <button class="btn servo off"  id="btn-servo"  onclick="toggle('servo')">🔧 Servo</button>
      <button class="btn buzzer off" id="btn-buzzer" onclick="toggle('buzzer')">🔔 Buzzer</button>
    </div>
  </div>

  <div class="charts-section">
    <div class="section-title">กราฟข้อมูลย้อนหลัง (50 รายการล่าสุด)</div>
    <div class="chart-tabs">
      <button class="tab active" onclick="showChart('temp-chart', this)">🌡️ Temperature</button>
      <button class="tab"        onclick="showChart('hum-chart',  this)">💧 Humidity</button>
      <button class="tab"        onclick="showChart('light-chart',this)">☀️ Light</button>
      <button class="tab"        onclick="showChart('motion-chart',this)">🚶 Motion</button>
    </div>
    <div class="chart-wrap active" id="temp-chart"><canvas id="chartTemp"></canvas></div>
    <div class="chart-wrap" id="hum-chart"><canvas id="chartHum"></canvas></div>
    <div class="chart-wrap" id="light-chart"><canvas id="chartLight"></canvas></div>
    <div class="chart-wrap" id="motion-chart"><canvas id="chartMotion"></canvas></div>
  </div>

  <div class="timestamp" id="ts">ยังไม่ได้รับข้อมูล</div>

  <script>
    const state = { led: false, servo: false, buzzer: false };

    // ---- Chart Setup ----
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = '#1e293b';

    function makeChart(ctxId, label, color, yLabel) {
      const ctx = document.getElementById(ctxId).getContext('2d');
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label,
            data: [],
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: color,
            fill: true,
            tension: 0.35,
          }]
        },
        options: {
          responsive: true,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0f172a',
              borderColor: '#334155',
              borderWidth: 1,
            }
          },
          scales: {
            x: {
              grid: { color: '#334155' },
              ticks: { maxTicksLimit: 8, maxRotation: 30 }
            },
            y: {
              grid: { color: '#334155' },
              title: { display: true, text: yLabel, color: '#64748b' }
            }
          }
        }
      });
    }

    const chartTemp   = makeChart('chartTemp',   'Temperature', '#f87171', '°C');
    const chartHum    = makeChart('chartHum',    'Humidity',    '#60a5fa', '%');
    const chartLight  = makeChart('chartLight',  'Light',       '#fbbf24', 'lux');
    const chartMotion = makeChart('chartMotion', 'Motion',      '#a78bfa', '');

    // ---- Tab Switch ----
    function showChart(id, btn) {
      document.querySelectorAll('.chart-wrap').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2,'0') + ':' +
             d.getMinutes().toString().padStart(2,'0') + ':' +
             d.getSeconds().toString().padStart(2,'0');
    }

    // ---- Fetch Latest ----
    async function fetchData() {
      try {
        const res = await fetch('/api/data');
        const d = await res.json();
        if (!d || !d.timestamp) return;

        document.getElementById('temp').textContent     = d.temperature != null ? d.temperature.toFixed(1) : '--';
        document.getElementById('humidity').textContent = d.humidity    != null ? d.humidity.toFixed(1)    : '--';
        document.getElementById('light').textContent    = d.light       != null ? d.light                  : '--';

        const motionEl   = document.getElementById('motion');
        const motionCard = document.getElementById('motion-card');
        if (d.motion) {
          motionEl.textContent   = 'พบการเคลื่อนไหว';
          motionCard.className   = 'card motion-on';
        } else {
          motionEl.textContent   = 'ไม่พบ';
          motionCard.className   = 'card motion-off';
        }

        const alertEl = document.getElementById('alert-msg');
        if (d.temperature > 35) {
          alertEl.textContent    = '⚠️ อุณหภูมิสูงเกินกำหนด: ' + d.temperature.toFixed(1) + '°C';
          alertEl.style.display  = 'block';
        } else {
          alertEl.style.display  = 'none';
        }

        document.getElementById('ts').textContent = 'อัปเดตล่าสุด: ' + new Date(d.timestamp).toLocaleString('th-TH');
      } catch (e) {
        document.getElementById('ts').textContent = 'ไม่สามารถเชื่อมต่อ Backend';
      }
    }

    // ---- Fetch History & Update Charts ----
    async function fetchHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return;

        const sorted = [...data].reverse(); // เรียงเก่า→ใหม่
        const labels = sorted.map(d => fmtTime(d.timestamp));

        function setChart(chart, values) {
          chart.data.labels = labels;
          chart.data.datasets[0].data = values;
          chart.update('none');
        }

        setChart(chartTemp,  sorted.map(d => d.temperature));
        setChart(chartHum,   sorted.map(d => d.humidity));
        setChart(chartLight, sorted.map(d => d.light));

        chartMotion.data.labels = labels;
        chartMotion.data.datasets[0].data = sorted.map(d => d.motion ? 1 : 0);
        chartMotion.options.scales.y.min = -0.1;
        chartMotion.options.scales.y.max = 1.2;
        chartMotion.options.scales.y.ticks = {
          callback: v => v === 1 ? 'พบ' : v === 0 ? 'ไม่พบ' : ''
        };
        chartMotion.update('none');
      } catch (e) {}
    }

    // ---- Fetch Status ----
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const d = await res.json();
        ['led', 'servo', 'buzzer'].forEach(key => {
          state[key] = d[key] || false;
          updateBtn(key);
        });
      } catch (_) {}
    }

    // ---- Toggle ----
    async function toggle(device) {
      state[device] = !state[device];
      updateBtn(device);
      try {
        const res = await fetch('/api/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ [device]: state[device] }),
        });
        if (res.status === 429) {
          state[device] = !state[device];
          updateBtn(device);
          alert('กดเร็วเกินไป กรุณารอสักครู่');
        }
      } catch (e) {
        state[device] = !state[device];
        updateBtn(device);
        alert('เชื่อมต่อ Backend ไม่ได้');
      }
    }

    function updateBtn(device) {
      const btn = document.getElementById('btn-' + device);
      btn.className = 'btn ' + device + ' ' + (state[device] ? 'on' : 'off');
      const labels = { led: '💡 LED', servo: '🔧 Servo', buzzer: '🔔 Buzzer' };
      btn.textContent = labels[device] + (state[device] ? ' (เปิด)' : ' (ปิด)');
    }

    // ---- Init ----
    fetchData();
    fetchStatus();
    fetchHistory();
    setInterval(fetchData,    5000);
    setInterval(fetchHistory, 15000);
    setInterval(fetchStatus,  10000);
  </script>
</body>
</html>
